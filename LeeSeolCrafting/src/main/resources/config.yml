recipes:
  iron_pickaxe_basic:
    type: crafting
    display-name: "&f초급 철 곡괭이"
    required-rank: PLAYER
    cost: 5000
    success-rate: 1.0
    inputs:
      - material: IRON_INGOT
        amount: 3
      - material: STICK
        amount: 2
    result:
      material: IRON_PICKAXE
      amount: 1
      name: "&f초급 철 곡괭이"
      lore:
        - "&7기본 제작 장비"

  raw_iron_processing:
    type: processing
    display-name: "&f원철 가공"
    required-rank: PLAYER
    cost: 100
    success-rate: 1.0
    inputs:
      - material: RAW_IRON
        amount: 1
    result:
      material: IRON_INGOT
      amount: 1

  iron_tool_disassemble:
    type: disassemble
    display-name: "&f철 도구 분해"
    required-rank: PLAYER
    cost: 0
    success-rate: 1.0
    inputs:
      - material: IRON_PICKAXE
        amount: 1
    result:
      material: IRON_NUGGET
      amount: 9

