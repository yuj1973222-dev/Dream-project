combat-tag:
  enabled: true
  duration-seconds: 15
  enabled-worlds:
    - world
    - world_nether
    - dungeon
  notify-on-refresh: false

combat-logout:
  kill-during-combat: true

logout-clone:
  enabled: true
  # Paper backend에서는 로비 이동과 일반 접속 종료가 모두 QuitEvent로 보인다.
  # 그래서 아래 월드에서 서버를 나가면 전투 대역 NPC를 생성한다.
  enabled-worlds:
    - world
    - world_nether
  # lying-corpse: 플레이어 스킨/장비 NPC를 눕히고, 보이지 않는 Interaction 히트박스로 타격 판정을 넓힌다.
  # stable-husk: Citizens HUSK NPC 자체를 전투 잔상으로 사용하는 예비 모드.
  mode: lying-corpse
  name-format: "&c%player%의 전투 잔상"
  remove-on-owner-return: true
  drop-inventory-on-kill: true
  apply-death-on-next-join: true
  show-health-in-name: true
  hitbox:
    enabled: true
    # PLAYER는 접속 종료 시 플레이어가 보던 방향을 사용한다. NORTH/SOUTH/EAST/WEST로 고정할 수도 있다.
    direction: PLAYER
    # Interaction 히트박스는 중심 1개 + 실제 눕는 방향 보정용 측면 1개를 만든다.
    length-blocks: 2
    width: 1.15
    height: 0.3
    y-offset: 0.05
    # 공중 접속 종료 시 가장 가까운 바닥으로 내려서 시체와 히트박스를 생성한다.
    ground-on-spawn: true
    max-ground-search-blocks: 48
    # 반복 동기화는 SleepTrait 자세 흔들림을 만들 수 있어 기본 비활성화한다.
    sync-to-npc: false
    sync-interval-ticks: 2

death-cleanup:
  # 이전 방식의 죽음 화면 반복 문제를 막기 위해 접속 시 죽음 상태면 자동 복구한다.
  respawn-dead-on-join: true
  # 전투 잔상이 처치된 플레이어는 재접속 시 지정 월드의 스폰 지점으로 보낸다.
  teleport-to-spawn-on-pending-death: true
  spawn-world: world

spectator-clone:
  enabled: true

pvp-rewards:
  enabled: true
  data-file: "/opt/minecraft/shared/combat/pvp.yml"
  enabled-worlds:
    - world
    - world_nether
  points-per-kill: 1
  repeat-kill-cooldown-seconds: 600
  ignore-same-town-or-nation: true
  trophy:
    enabled: true
    name: "&c%victim%의 증표"
    lore:
      - "&7처치자: &f%killer%"
      - "&7희생자: &f%victim%"
      - "&7시간: &f%time%"

messages:
  prefix: "&7[&c전투&7] "
  combat-start: "&c전투 상태에 진입했습니다. &f%seconds%초 동안 서버를 나가면 처벌됩니다."
  combat-refresh: "&c전투 시간이 갱신되었습니다. &f%seconds%초"
