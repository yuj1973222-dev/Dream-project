settings:
  enabled: true
  allowed-worlds:
    - world
    - world_nether
  blocked-worlds:
    - dungeon
  save-interval-seconds: 60

storage:
  data-file: "/opt/minecraft/shared/jobs/data.yml"

economy:
  log-rewards: false

daily-limits:
  mining: 50000
  farming: 30000
  fishing: 30000

rank-multipliers:
  PLAYER: 1.0
  D: 1.05
  C: 1.10
  B: 1.20
  A: 1.35
  S: 1.50

mining:
  enabled: true
  cooldown-millis: 250
  anti-place-abuse:
    enabled: true
    remember-minutes: 30
  rewards:
    COAL_ORE: 20
    DEEPSLATE_COAL_ORE: 25
    IRON_ORE: 40
    DEEPSLATE_IRON_ORE: 50
    COPPER_ORE: 30
    DEEPSLATE_COPPER_ORE: 35
    GOLD_ORE: 70
    DEEPSLATE_GOLD_ORE: 80
    REDSTONE_ORE: 45
    DEEPSLATE_REDSTONE_ORE: 55
    LAPIS_ORE: 60
    DEEPSLATE_LAPIS_ORE: 70
    DIAMOND_ORE: 250
    DEEPSLATE_DIAMOND_ORE: 300
    EMERALD_ORE: 300
    DEEPSLATE_EMERALD_ORE: 350

farming:
  enabled: true
  require-fully-grown: true
  rewards:
    WHEAT: 8
    CARROTS: 8
    POTATOES: 8
    BEETROOTS: 8
    NETHER_WART: 12
    COCOA: 10

fishing:
  enabled: true
  cooldown-millis: 1000
  rewards:
    default: 30
    treasure: 150

messages:
  prefix: "&7[&a직업&7] "
  player-only: "&c게임 안에서만 사용할 수 있습니다."
  no-permission: "&c권한이 없습니다."
  reloaded: "&aLeeSeolJobs 설정을 다시 불러왔습니다."
  reward: "&f%type% 보상으로 &a%amount%원&f을 획득했습니다."
  daily-limit: "&c오늘 %type% 보상 한도에 도달했습니다."
  stats: "&f오늘 보상 - 광질: &a%mining%원 &7/ 농사: &a%farming%원 &7/ 낚시: &a%fishing%원"
  reset: "&a%player%의 Jobs 데이터를 초기화했습니다."
  player-not-found: "&c대상 유저를 찾을 수 없습니다."
  status: "&f등록 유저: &a%players%명"
