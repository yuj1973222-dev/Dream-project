settings:
  min-town-members: 2
  party-max-members: 4
  nation-required-members: 5

nation:
  colors:
    red:
      display-name: "빨강"
      hex: "#FF5C7A"
    orange:
      display-name: "주황"
      hex: "#FFB86B"
    yellow:
      display-name: "노랑"
      hex: "#FFD166"
    green:
      display-name: "초록"
      hex: "#8FD9A8"
    blue:
      display-name: "파랑"
      hex: "#8EC5FF"
    purple:
      display-name: "보라"
      hex: "#C7A8FF"

storage:
  data-file: "/opt/minecraft/shared/town/data.yml"

scoreboard:
  enabled: true
  update-interval-ticks: 40
  title: "&#8FD9A8EXPEDITION"

neutral-zones:
  data-file: "/opt/minecraft/shared/town/neutral-zones.yml"
  core-content-file: "plugins/LeeSeolCore/contents.yml"
  default-claim-buffer-chunks: 2
  worldguard:
    enabled: true
    region-prefix: "leeseol_neutral_"
    priority: 50
    flags:
      build: DENY
      block-break: DENY
      block-place: DENY
      pvp: DENY
  protection:
    block-break: true
    block-place: true
    pvp: true
  bluemap:
    enabled: true
    marker-set-id: "leeseol-neutral-zones"
    marker-set-label: "중립구역"
    default-hidden: false
    sorting: 20
    line-width: 2
    depth-test: false
    line-color: "#8FD9A8"
    line-alpha: 0.9
    fill-color: "#8FD9A8"
    fill-alpha: 0.18
    map-overrides:
      world: "overworld"

nation-claims:
  bluemap:
    enabled: true
    marker-set-id: "leeseol-nation-claims"
    marker-set-label: "Nation Territory"
    default-hidden: false
    sorting: 30
    line-width: 1
    depth-test: false
    min-y: 60
    max-y: 320
    line-alpha: 0.85
    fill-alpha: 0.12
    map-overrides:
      world: "overworld"

economy:
  enabled: true
  time-zone: "Asia/Seoul"
  chunk-claim-cost: 25000
  claim-scaling:
    free-claims: 4
    step-claims: 8
    rate: 0.08
    max-multiplier: 2.5
  nation-tax-base: 15000
  nation-member-tax: 1500
  upkeep:
    enabled: true
    check-interval-minutes: 60
    grace-days: 3
    base-nation-fee: 15000
    member-fee: 1500
    base-per-chunk: 1200
    free-chunks: 6
    claim-scale-step: 8
    claim-scale-rate: 0.12
    max-claim-multiplier: 3.0
  premium-zones:
    spawn_core:
      name: "스폰 중심 상권"
      world: "world"
      min-x: -4
      max-x: 4
      min-z: -4
      max-z: 4
      claim-cost-multiplier: 4.0
      upkeep-multiplier: 4.0
    spawn_ring:
      name: "스폰 인접권"
      world: "world"
      min-x: -12
      max-x: 12
      min-z: -12
      max-z: 12
      claim-cost-multiplier: 2.0
      upkeep-multiplier: 2.0

war:
  surrender-payment: 100000
  protection-minutes: 10
  debt-hours: 12
  modes:
    invasion:
      display-name: "침략전"
      direction: "소규모 / 제한 손실 / 짧은 전투"
    total:
      display-name: "총력전"
      direction: "대규모 / 큰 손실 / 긴 전쟁"

structures:
  enabled: true
  schematic-directory: "structures"
  itemsadder:
    required: true
    allowed-core-blocks:
      - "leeseolwar:capital_core"
      - "leeseolwar:border_outpost_core"
      - "leeseolwar:supply_depot_core"
  soft-overwrite-blocks:
    - AIR
    - CAVE_AIR
    - VOID_AIR
    - SHORT_GRASS
    - TALL_GRASS
    - FERN
    - LARGE_FERN
    - SNOW
  types:
    nation_core:
      name: "&b국가 코어"
      icon: BEACON
      itemsadder-block: "leeseolwar:capital_core"
      schematic: ""
      category: "nation-core"
      permission: "leeseoltown.structure.nation_core"
      width: 15
      height: 12
      length: 15
      offset-x: -7
      offset-y: 0
      offset-z: -7
      marker-offset-x: 0
      marker-offset-y: 0
      marker-offset-z: 0
    outpost:
      name: "&a전초기지"
      icon: CAMPFIRE
      itemsadder-block: "leeseolwar:border_outpost_core"
      schematic: "outpost.schem"
      category: "normal"
      permission: "leeseoltown.structure.outpost"
      width: 24
      height: 10
      length: 24
      offset-x: -12
      offset-y: 0
      offset-z: -12
      marker-offset-x: 0
      marker-offset-y: 0
      marker-offset-z: 0
    supply_depot:
      name: "&a보급 창고"
      icon: BARREL
      itemsadder-block: "leeseolwar:supply_depot_core"
      schematic: "supply_depot.schem"
      category: "normal"
      permission: "leeseoltown.structure.supply_depot"
      width: 16
      height: 8
      length: 16
      offset-x: -8
      offset-y: 0
      offset-z: -8
      marker-offset-x: 0
      marker-offset-y: 0
      marker-offset-z: 0

prefix:
  town: "&#8FD9A8%town% "
  nation: "%nation_color%%nation% "

chat:
  global-format: "%rank%%affiliation%&f%player%&7: &f%message%"
  town-format: "&a[파티] %rank%%affiliation%&f%player%&7: &f%message%"
  nation-format: "&6[국가] %rank%%affiliation%&f%player%&7: &f%message%"

