  prefix: "&7[&6랭크&7] "
  player-only: "&c게임 안에서만 사용할 수 있습니다."
  info-self: "&f현재 랭크: &e%rank% &7/ 다음 승급까지: &e%kills%/%required%"
  info-max: "&f현재 랭크: &e%rank% &7/ 최고 랭크입니다."
  info-other: "&f%player% 랭크: &e%rank% &7/ 킬 &e%kills%"
  kill-progress: "&f랭크 승급 진행도: &e%kills%/%required%"
  rank-up-ready: "&a승급 조건을 채웠습니다. &e/rankup&a 으로 &e%rank%&a 랭크에 승급할 수 있습니다."
  rank-up-not-ready: "&c아직 승급할 수 없습니다. &7%rank% 승급 조건: &e%kills%/%required%"
  rank-up: "&a랭크가 &e%rank%&a로 승급되었습니다. 킬 카운트가 초기화되었습니다."
  set-rank: "&f%player%의 랭크를 &e%rank%&f로 설정했습니다."
  dev-on: "&f%player%에게 &bDEV 랭크&f를 부여했습니다."
  dev-off: "&f%player%의 랭크를 &ePLAYER&f로 변경했습니다."
  status: "&f등록 유저: &e%players%명"
