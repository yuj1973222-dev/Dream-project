storage:
  # 비워두면 각 서버의 plugins/LeeSeolRanks/ranks.yml을 사용합니다.
  # 배포 서버에서는 lobby/survival 연동을 위해 /opt/minecraft/shared/ranks/ranks.yml로 맞춥니다.
  data-file: ""

luckperms-sync:
  enabled: true

staff:
  # ADMIN과 DEV에게 동일하게 부여할 LuckPerms 권한 목록입니다.
  # "*"는 LuckPerms 기준 OP급 전체 권한입니다.
  admin-permissions:
    - "*"

rank-up:
  # PLAYER -> D -> C -> B -> A -> S 순서로 승급합니다.
  # 조건을 채운 뒤 /rankup 또는 /rank up 명령어를 직접 입력해야 승급합니다.
  thresholds:
    D: 10
    C: 20
    B: 30
    A: 50
    S: 100
  # requirements가 있으면 thresholds 대신 해당 랭크의 kills/money/playtime 조건을 함께 확인합니다.
  # money는 보유 조건이며 승급 시 차감하지 않습니다.
  requirements:
    D:
      kills: 10
      money: 0
      playtime-minutes: 0
    C:
      kills: 20
      money: 10000
      playtime-minutes: 120
    B:
      kills: 30
      money: 50000
      playtime-minutes: 300
    A:
      kills: 50
      money: 150000
      playtime-minutes: 600
    S:
      kills: 100
      money: 500000
      playtime-minutes: 1200

