server:
  # survival, dungeon, both. Multi-world mode uses both on the survival Paper server.
  role: "both"

dungeon-world:
  enabled: true
  name: "dungeon"
  return-world: "world"
  environment: "NORMAL"
  type: "NORMAL"
  generate-structures: true
  seed: ""
  spawn:
    x: 0.5
    y: 65.0
    z: 0.5
    yaw: 0.0
    pitch: 0.0
  return-spawn:
    x: 0.5
    y: 65.0
    z: 0.5
    yaw: 0.0
    pitch: 0.0

inventory-sync:
  # Same Paper process means player inventory/health are already shared by Minecraft itself.
  enabled: false
  data-file: "/opt/minecraft/shared/dungeon/inventories.yml"
  load-delay-ticks: 10
  save-on-quit: false
  save-before-portal-transfer: false
  sync-ender-chest: true
  sync-health-food-exp: true

return-random:
  enabled: true
  data-file: "/opt/minecraft/shared/dungeon/returns.yml"
  radius: 50
  delay-ticks: 30
  max-attempts: 50

portal-triggers:
  enabled: true
  cooldown-seconds: 3
  portals: {}

dungeon-protection:
  enabled: true
  worlds:
    - "dungeon"
  allow-admin-bypass: true
  block-break: false
  block-place: false
  buckets: false
  explosions: false
  mob-griefing-block-change: false

loot-chests:
  enabled: true
  roll-interval-seconds: 300
  default-chance: 0.25
  default-respawn-seconds: 1800
  replace-existing: false
  refill-existing-chest: false
  spots: {}
  loot-tables:
    default:
      contents: []

