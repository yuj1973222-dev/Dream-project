  prefix: "&#B9E6FF[던전] &f"
  no-permission: "&c권한이 없습니다."
  player-only: "&c게임 안에서만 사용할 수 있습니다."
  reloaded: "&aLeeSeolDungeon 설정을 다시 불러왔습니다."
  dungeon-entered: "&a던전 월드로 이동했습니다."
  dungeon-exited: "&a던전에서 나왔습니다."
  target-world-missing: "&c대상 월드를 찾을 수 없습니다: &f%world%"
  portal-pos1: "&a포탈 pos1 설정: &f%pos%"
  portal-pos2: "&a포탈 pos2 설정: &f%pos%"
  portal-created: "&a포탈을 저장했습니다. &f%id% &7-> &f%target%"
