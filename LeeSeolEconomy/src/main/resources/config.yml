features:
  vault-provider: true
  economy-commands: true
  shops: true
  npcs: true
  server-menu: true
  market: true
  ledger: true

storage:
  balances-file: "/opt/minecraft/shared/economy/balances.properties"
  market-file: "/opt/minecraft/shared/economy/market.yml"
  ledger-file: "/opt/minecraft/shared/economy/ledger.yml"

currency:
  name: "원"
  starting-balance: 10000

ledger:
  time-zone: "Asia/Seoul"

market:
  reset-time-zone: "Asia/Seoul"
  # Prevent lobby inventory from being converted into survival money.
  allowed-local-servers:
    - "survival"
  bank:
    daily-total-budget: 5000000
  memory:
    rolling-days: 7
    keep-days: 21
  rotation:
    enabled: true
    default-active-offers-per-category: 4
  stock:
    # The server "uses" part of stocked items each day, so old pressure cools down slowly.
    daily-decay-rate: 0.18
    target-days: 3.0
  pricing:
    global-sold-discount-max: 0.45
    rolling-sold-discount-max: 0.25
    personal-sold-discount-max: 0.35
    stock-discount-max: 0.30
    budget-discount-max: 0.40
