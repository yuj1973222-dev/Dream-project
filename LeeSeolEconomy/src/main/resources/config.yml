    y: 65.0
    z: 0.5
    yaw: 0.0
    pitch: 0.0
    type: VILLAGER
    skin: ""
    name: "&e상점"

server-menu:
  title: "&0서버 메뉴"
  # Deployment scripts set this to lobby or survival on each backend.
  local-server: "survival"
  size: 27
  shortcut:
    enabled: true
    require-sneak: true
    cooldown-millis: 700
  external-menu:
    enabled: false
    # Enable this after DeluxeMenus is installed and the menu id is finalized.
    # Example: "dm open pixiestudios_gamemenu1 %player%"
    open-command: ""
  blocked-worlds:
    dungeon:
      bypass-permission: "leeseoldungeon.menu-bypass"
      message: "&c던전 월드에서는 서버 이동 메뉴를 사용할 수 없습니다."
  filler:
    enabled: true
    material: GRAY_STAINED_GLASS_PANE
    name: " "
  items:
    lobby:
      slot: 10
      server: "lobby"
      material: SNOWBALL
      name: "&#9ADBF5로비"
      lore:
        - "&7상점과 안내가 있는 대기 공간"
        - "&e클릭해서 이동"
    auction:
      slot: 13
      command: "auction"
      material: GOLD_INGOT
      name: "&#FFD166경매장"
      lore:
        - "&7아이템을 맡기고 경매에 입찰합니다."
        - "&7관리자가 열었을 때만 입찰 가능합니다."
        - "&e클릭해서 열기"
    survival:
      slot: 16
      server: "survival"
      material: GRASS_BLOCK
      name: "&#9BE7A1야생"
      lore:
        - "&7채집, 건축, 탐험을 하는 메인 월드"
        - "&e클릭해서 이동"
    admin_newworld:
      slot: 21
      server: "newworld"
      permission: "leeseoldungeon.admin"
      material: COMPASS
      name: "&#B9E6FF신세계"
      lore:
        - "&c관리자 전용"
        - "&7추후 데이터팩과 전용 맵을 넣을 신세계 서버"
        - "&e클릭해서 이동"
    admin_dungeon:
      slot: 23
      command: "dungeon enter"
      permission: "leeseoldungeon.admin"
      local-servers:
        - "survival"
      material: ENDER_EYE
      name: "&#C7B9FF던전"
      lore:
        - "&c관리자 전용"
        - "&7야생 서버 내부의 던전 월드로 이동합니다."
        - "&e클릭해서 이동"
