name: LeeSeolCore
version: 0.1.0
main: me.leeseol.core.LeeSeolCorePlugin
api-version: '26.1.2'
description: Core features for LeeSeol's Minecraft network.
author: lee_seol
softdepend:
  - WorldEdit
  - WorldGuard
  - BlueMap
  - Citizens
commands:
  serverinfo:
    description: Shows simple server information.
    usage: /serverinfo
  survivalspawn:
    description: Returns a player to the survival spawn after a short channel.
    usage: /survivalspawn
    aliases:
      - returnspawn
      - lsspawn
  lscore:
    description: Manages LeeSeolCore.
    usage: /lscore reload
    permission: leeseolcore.admin
  leeseolcore:
    description: Manages LeeSeolCore.
    usage: /leeseolcore reload
    permission: leeseolcore.admin
  content:
    description: Registers and manages world content locations.
    usage: /content
    permission: leeseolcore.content.admin
permissions:
  leeseolcore.admin:
    description: Allows LeeSeolCore admin commands.
    default: op
  leeseolcore.content.admin:
    description: Allows managing LeeSeolCore content locations.
    default: op
  leeseolcore.dimension.bypass:
    description: Allows bypassing dimension portal restrictions.
    default: false
  leeseolcore.servermenu:
    description: Allows opening the lobby Shift+F server menu.
    default: true
  leeseolcore.survivalspawn:
    description: Allows returning to the survival spawn.
    default: true
