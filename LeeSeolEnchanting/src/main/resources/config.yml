settings:
  enabled: true
  allowed-worlds:
    - world
  debug: false

bookshelves:
  # Count the vanilla-style 5x5 outer ring on the enchanting-table level and one
  # block above it. This gives a custom maximum of 32 bookshelves.
  materials:
    - BOOKSHELF
  require-clear-inner-space: true

rolls:
  # The highest matching band wins.
  # Keep PvP-control enchants such as stun, silence, teleblock, trap, disarm, and
  # soul enchants out of the enchanting-table route. Those belong to dungeon or
  # recipe progression later.
  bands:
    low_room:
      min-bookshelves: 24
      chance-percent: 6.0
      output: APPLY_TO_ITEM
      candidates:
        - enchant: jellylegs
          min-level: 1
          max-level: 1
