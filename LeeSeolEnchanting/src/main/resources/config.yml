lore-descriptions:
  enabled: true
  refresh-on-inventory-click: true
  line-format: "&8- &7%description%"
  descriptions:
    jellylegs: "낙하 피해를 줄이거나 무시할 확률이 생깁니다."
    aquatic: "수중에서 숨을 쉴 수 있습니다."
    rebreather: "수중 채굴 중 산소를 회복할 확률이 생깁니다."
    glowing: "상시 야간 시야 효과를 얻습니다."
    smelting: "채굴한 블록이 일정 확률로 제련됩니다."
    hasten: "블록을 캘 때 일정 확률로 성급함을 얻습니다."
    haste: "도구 사용 속도가 빨라집니다."
    experience: "광석 채굴 시 추가 경험치를 얻을 확률이 생깁니다."
    autoreel: "물고기가 물면 낚싯대를 자동으로 감습니다."
    allurement: "낚시 보상을 두 배로 받을 확률이 생깁니다."
    bait: "낚시 보상을 두 배로 받을 확률이 생깁니다."
    lucky: "낚시 중 일정 확률로 행운이 증가합니다."
    adrenaline: "몹에게 피격될 때 힘 효과를 얻습니다."
    foraging: "나뭇잎 드롭이 증가할 확률이 생깁니다."
    springs: "점프력이 증가합니다."
    infernaltouch: "채굴한 블록이 일정 확률로 제련됩니다."
    oxygenate: "수중 채굴 중 산소를 회복합니다."
    waterborne: "수중에서 산소를 회복하는 데 도움을 줍니다."
    alacrity: "도구를 더 빠르게 사용할 수 있습니다."
    blazereaper: "네더 생물에게 주는 피해가 증가합니다."
    enderslayer: "엔더맨과 엔더 드래곤에게 주는 피해가 증가합니다."
    netherslayer: "네더 몹에게 주는 피해가 증가합니다."
    enderbane: "엔더 계열 몹에게 주는 피해가 증가합니다."
    cubism: "슬라임과 마그마 큐브에게 더 큰 피해를 줍니다."
    zombiecrusher: "좀비에게 주는 피해가 증가합니다."
    skullcrusher: "스켈레톤에게 주는 피해가 증가합니다."
    incinerate: "거미에게 주는 피해가 증가합니다."
    beastslayer: "적대적 몹에게 주는 피해가 증가합니다."
    hunter: "비선공 몹에게 주는 원거리 피해가 증가합니다."
